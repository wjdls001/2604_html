<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Malgun Gothic", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 64px;
        background-color: #fff;
        border-bottom: 1px solid #e0e0e0;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-logo {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #111;
        text-decoration: none;
      }

      .header-nav {
        display: flex;
        gap: 40px;
        list-style: none;
      }

      .header-nav a {
        text-decoration: none;
        font-size: 15px;
        color: #111;
        font-weight: 500;
        transition: color 0.2s;
      }

      .header-nav a:hover {
        color: #0057ff;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header-lang {
        display: flex;
        align-items: center;
        gap: 8px;
        list-style: none;
        font-size: 13px;
        color: #111;
      }

      .header-lang li + li::before {
        content: "|";
        margin-right: 8px;
        color: #ccc;
      }

      .header-lang a {
        text-decoration: none;
        color: #111;
        font-weight: 500;
        transition: color 0.2s;
      }

      .header-lang a:hover,
      .header-lang a.active {
        color: #0057ff;
        font-weight: 700;
      }

      .header-search {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        color: #111;
        transition: color 0.2s;
      }

      .header-search:hover {
        color: #0057ff;
      }

      /* 햄버거 버튼 */
      .hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        width: 36px;
        height: 36px;
      }

      .hamburger span {
        display: block;
        width: 24px;
        height: 2px;
        background-color: #111;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      /* 햄버거 열림 상태 → X 모양 */
      .hamburger.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .hamburger.open span:nth-child(2) {
        opacity: 0;
      }
      .hamburger.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }

      /* 모바일 드로어 */
      .mobile-menu {
        display: none;
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        background-color: #fff;
        border-bottom: 1px solid #e0e0e0;
        z-index: 99;
        padding: 16px 0;
        transform: translateY(-10px);
        opacity: 0;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }

      .mobile-menu.open {
        transform: translateY(0);
        opacity: 1;
      }

      .mobile-menu ul {
        list-style: none;
      }

      .mobile-menu ul li a {
        display: block;
        padding: 14px 24px;
        font-size: 15px;
        color: #111;
        text-decoration: none;
        font-weight: 500;
        transition: background-color 0.2s, color 0.2s;
      }

      .mobile-menu ul li a:hover {
        background-color: #f5f5f5;
        color: #0057ff;
      }

      .mobile-menu-lang {
        display: flex;
        gap: 12px;
        padding: 14px 24px;
        border-top: 1px solid #f0f0f0;
        margin-top: 8px;
        list-style: none;
      }

      .mobile-menu-lang a {
        font-size: 13px;
        color: #111;
        text-decoration: none;
        font-weight: 500;
      }

      .mobile-menu-lang a.active {
        color: #0057ff;
        font-weight: 700;
      }

      /* 반응형 */
      @media (max-width: 768px) {
        header {
          padding: 0 20px;
        }

        nav,
        .header-lang {
          display: none;
        }

        .hamburger {
          display: flex;
        }

        .mobile-menu {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="#" class="header-logo">LOGO</a>
      <nav>
        <ul class="header-nav">
          <li><a href="#">회사소개</a></li>
          <li><a href="#">제품소개</a></li>
          <li><a href="#">문의 게시판</a></li>
        </ul>
      </nav>
      <div class="header-right">
        <ul class="header-lang">
          <li><a href="#" class="active">KR</a></li>
          <li><a href="#">EN</a></li>
        </ul>
        <button class="header-search" aria-label="검색">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <!-- 모바일 드로어 메뉴 -->
    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li><a href="#">회사소개</a></li>
        <li><a href="#">제품소개</a></li>
        <li><a href="#">문의 게시판</a></li>
      </ul>
      <ul class="mobile-menu-lang">
        <li><a href="#" class="active">KR</a></li>
        <li><a href="#">EN</a></li>
      </ul>
    </div>

    <div></div>
    <footer></footer>

    <script>
      const hamburger = document.getElementById("hamburger");
      const mobileMenu = document.getElementById("mobileMenu");

      hamburger.addEventListener("click", () => {
        const isOpen = hamburger.classList.toggle("open");
        mobileMenu.classList.toggle("open", isOpen);
        hamburger.setAttribute(
          "aria-label",
          isOpen ? "메뉴 닫기" : "메뉴 열기"
        );
      });

      // 메뉴 링크 클릭 시 닫기
      mobileMenu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          hamburger.classList.remove("open");
          mobileMenu.classList.remove("open");
        });
      });
    </script>
  </body>
</html>
